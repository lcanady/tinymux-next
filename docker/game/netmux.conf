# =============================================================================
# TinyMUX test configuration
# All options tuned for fast startup and module testing.
# =============================================================================

# Ports
port                    4201
port_ssl                0

# Database
input_database          data/netmux.db
output_database         data/netmux.db.new
crash_database          data/netmux.db.CRASH

# Text files
motd_file               text/motd.txt
wizmotd_file            text/wizmotd.txt
quit_file               text/quit.txt
down_file               text/down.txt
full_file               text/full.txt
register_file           text/register.txt

# Logging — verbose for test diagnostics
log_file                data/netmux.log
log_options             all

# Game settings
mud_name                TestMUX
player_name_spaces      no
fork_dump               no
max_players             50

# Modules — load all new modules for testing
module execscript
module jsonparse
module httpclient

# WebSocket bridge
ws_enabled      yes
ws_port         4202
wss_port        0
ws_max_clients  50

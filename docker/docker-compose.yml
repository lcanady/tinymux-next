version: "3.9"

# =============================================================================
# TinyMUX:Next — Docker Compose
# Image: lcanady/tinymux-next
#
# Start the server:
#   docker compose up server
#
# Override netmux.conf values at runtime (entrypoint patches the conf):
#   MUX_NAME="MyMUSH" MUX_MAX_CLIENTS=200 docker compose up server
#
# Persist data on the host filesystem instead of named volumes:
#   MUX_DATA=./data MUX_SCRIPTS=./scripts docker compose up server
#
# Run the full test suite (unit + integration):
#   docker compose run --rm test
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # server — persistent TinyMUX:Next game server
  #
  # Classic MUX ports (unchanged since TinyMUD):
  #   4201  telnet  — MUD/MUSH clients (MUSHclient, Mudlet, telnet)
  #   4202  ws://   — WebSocket clients and browser frontends
  #
  # Persist data on the host:
  #   MUX_DATA=./data MUX_SCRIPTS=./scripts docker compose up server
  # ---------------------------------------------------------------------------
  server:
    image: lcanady/tinymux-next
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["server"]
    ports:
      - "4201:4201"   # telnet
      - "4202:4202"   # WebSocket
    volumes:
      - ${MUX_DATA:-mux_data}:/mux/game/data
      - ${MUX_SCRIPTS:-mux_scripts}:/mux/game/scripts
    environment:
      # Passed to entrypoint.sh which patches netmux.conf before starting.
      # Leave unset to honour whatever netmux.conf (or a mounted volume) says.
      - MUX_NAME=${MUX_NAME:-}
      - MUX_MAX_CLIENTS=${MUX_MAX_CLIENTS:-}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # mock_httpd — lightweight HTTP server used by the integration test suite
  # ---------------------------------------------------------------------------
  mock_httpd:
    image: python:3.12-slim
    command: python3 /tests/mock_httpd.py --port 8765
    volumes:
      - ../mux/src/tests/mock_httpd.py:/tests/mock_httpd.py:ro
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [test]

  # ---------------------------------------------------------------------------
  # test — run Catch2 unit tests + Python integration tests, then exit
  # ---------------------------------------------------------------------------
  test:
    image: lcanady/tinymux-next
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      mock_httpd:
        condition: service_healthy
    environment:
      - MOCK_HTTP_HOST=mock_httpd
      - MOCK_HTTP_PORT=8765
    command: ["test"]
    volumes:
      - test_results:/mux/test_results
    profiles: [test]

volumes:
  # Named volumes for persistent server data (database, logs) and scripts
  mux_data:
  mux_scripts:

  # Named volume for test result XML/logs
  test_results:

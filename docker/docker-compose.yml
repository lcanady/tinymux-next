version: "3.9"

# =============================================================================
# TinyMUX — Docker Compose
#
# Run the test suite:
#   docker compose run --rm test
#
# Run a persistent server:
#   docker compose up server
#
# Run a persistent server with data on the host filesystem:
#   MUX_DATA=./mydata MUX_SCRIPTS=./myscripts docker compose up server
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # mock_httpd — lightweight HTTP server used by the integration test suite
  # ---------------------------------------------------------------------------
  mock_httpd:
    image: python:3.12-slim
    command: python3 /tests/mock_httpd.py --port 8765
    volumes:
      - ../mux/src/tests/mock_httpd.py:/tests/mock_httpd.py:ro
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [test]

  # ---------------------------------------------------------------------------
  # test — run Catch2 unit tests + Python integration tests, then exit
  # ---------------------------------------------------------------------------
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      mock_httpd:
        condition: service_healthy
    environment:
      - MOCK_HTTP_HOST=mock_httpd
      - MOCK_HTTP_PORT=8765
    command: ["test"]
    volumes:
      - test_results:/mux/test_results
    profiles: [test]

  # ---------------------------------------------------------------------------
  # server — persistent TinyMUX game server
  #
  # Ports:
  #   4201  telnet / MUD clients (e.g. MUSHclient, Mudlet)
  #   4202  WebSocket (ws://host:4202)
  #
  # Data is stored in named Docker volumes by default.
  # Override with env vars to use host directories:
  #   MUX_DATA=./data MUX_SCRIPTS=./scripts docker compose up server
  # ---------------------------------------------------------------------------
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["server"]
    ports:
      - "${MUX_TELNET_PORT:-4201}:4201"
      - "${MUX_WS_PORT:-4202}:4202"
    volumes:
      - ${MUX_DATA:-mux_data}:/mux/game/data
      - ${MUX_SCRIPTS:-mux_scripts}:/mux/game/scripts
    environment:
      - MUX_PORT=4201
      - MUX_WS_PORT=4202
    restart: unless-stopped
    profiles: [server]

volumes:
  # Named volume for test result XML/logs
  test_results:

  # Named volumes for persistent server data (database, logs) and scripts
  mux_data:
  mux_scripts:
